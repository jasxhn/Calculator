<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="shortcut icon" href="./images/calculator.png" type="image/x-icon">
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    
    <div id="calculator-body">
        <input type="text" id="display" readonly>
            <div id="buttons"">
                <button onclick="clearDisplay()" class="op">C</button>
                <button onclick="enterInDisplay('1')">1</button>
                <button onclick="enterInDisplay('2')">2</button>
                <button onclick="enterInDisplay('3')">3</button>
                <button onclick="enterInDisplay('-')" class="op">-</button>
                <button onclick="enterInDisplay('4')">4</button>
                <button onclick="enterInDisplay('5')">5</button>
                <button onclick="enterInDisplay('6')">6</button>
                <button onclick="enterInDisplay('*')" class="op">*</button>
                <button onclick="enterInDisplay('7')">7</button>
                <button onclick="enterInDisplay('8')">8</button>
                <button onclick="enterInDisplay('9')">9</button>
                <button onclick="calculateResult()" class="op">=</button>
                <button onclick="enterInDisplay('+')" class="op">+</button>
                <button onclick="enterInDisplay('0')">0</button>
                <button onclick="enterInDisplay('.')" class="op">.</button>
                <button onclick="enterInDisplay('/')" class="op">/</button>
            </div>
    </div>
<script src="./index.js"></script>
</body>
</html>
